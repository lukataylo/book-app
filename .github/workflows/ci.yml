name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build + Test (iOS Simulator)
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift Packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project BookApp.xcodeproj \
            -scheme BookApp

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project BookApp.xcodeproj \
            -scheme BookApp \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | tee build.log

      - name: Test
        run: |
          set -o pipefail
          xcodebuild test \
            -project BookApp.xcodeproj \
            -scheme BookApp \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro' \
            CODE_SIGNING_ALLOWED=NO \
            | tee test.log

      - name: Verify no secrets in tree
        run: |
          # Match real Anthropic key shapes (long alphanumeric tail), not the
          # placeholder regex string in this workflow itself.
          if grep -rEI 'sk-ant-(api|admin)[0-9]{2}-[A-Za-z0-9_-]{60,}' . \
              --exclude-dir=.git --exclude-dir=DerivedData; then
            echo "::error::Anthropic API key leaked into the working tree"
            exit 1
          fi
