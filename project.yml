name: BookApp
options:
  bundleIdPrefix: com.lukataylor
  deploymentTarget:
    iOS: "18.0"
    macOS: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false
  defaultConfig: Debug
  groupSortPosition: top
  developmentLanguage: en

configFiles:
  Debug: BookApp/Supporting/Default.xcconfig
  Release: BookApp/Supporting/Default.xcconfig

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO
    CODE_SIGN_STYLE: Automatic
    PRODUCT_BUNDLE_IDENTIFIER: com.lukataylor.bookapp
    INFOPLIST_FILE: BookApp/Supporting/Info.plist
    CODE_SIGN_ENTITLEMENTS: BookApp/Supporting/BookApp.entitlements
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    # DEVELOPMENT_TEAM is supplied by Default.xcconfig, which optionally
    # includes Local.xcconfig (gitignored). See Local.xcconfig.example.

packages:
  Readium:
    url: https://github.com/readium/swift-toolkit
    from: "3.0.0"
  # MLXSwift is opt-in. Add it after running:
  #   xcodebuild -downloadComponent MetalToolchain
  # then uncomment below + the dependency in the BookApp target.
  # MLXSwift:
  #   url: https://github.com/ml-explore/mlx-swift-examples
  #   from: "2.0.0"

targets:
  BookApp:
    type: application
    # macOS is reachable via Mac Catalyst (designedForIPad). Native macOS
    # currently fails to resolve Readium's SwiftSoup transitive dep — see
    # README → "macOS support".
    supportedDestinations: [iOS, iPadOS]
    sources:
      - path: BookApp
        excludes:
          - "Supporting/Info.plist"
          - "Supporting/BookApp.entitlements"
          - "Supporting/PrivacyInfo.xcprivacy"   # added below as explicit resource
          - "Resources/SeedBooks"     # added below as folder reference
          - "Resources/SummaryPacks"  # added below as folder reference
      # Privacy manifest — required by App Review since 2024. Apple wants
      # this at the bundle root, so we add it as an explicit resource
      # rather than letting it drop into a Supporting/ subfolder.
      - path: BookApp/Supporting/PrivacyInfo.xcprivacy
        buildPhase: resources
      # Folder-reference (blue folder) for SeedBooks so each book's files
      # — including identically-named `original.epub`, `cover.jpg`,
      # `meta.json` — survive into the .app bundle under their parent slug
      # rather than colliding at the bundle root. SeedBooksLoader walks
      # this directory at first launch.
      - path: BookApp/Resources/SeedBooks
        type: folder
        buildPhase: resources
        optional: true
      # Folder-reference for the summary catalog ("The Big Ideas in …")
      # JSON packs — Read/Remember/Act seed content. SummaryPackLoader
      # walks this directory at launch.
      - path: BookApp/Resources/SummaryPacks
        type: folder
        buildPhase: resources
        optional: true
      # Snapshot model is shared with the widget extension (which needs
      # the same file in its target).
      - path: BookAppWidget/WidgetSnapshot.swift
    dependencies:
      - package: Readium
        product: ReadiumShared
      - package: Readium
        product: ReadiumStreamer
      - package: Readium
        product: ReadiumNavigator
      - target: BookAppWidget
      # - package: MLXSwift
      #   product: MLXLLM
    settings:
      base:
        SWIFT_OBJC_BRIDGING_HEADER: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  BookAppWidget:
    type: app-extension
    supportedDestinations: [iOS, iPadOS]
    sources:
      - path: BookAppWidget
        excludes:
          - "Info.plist"
          - "BookAppWidget.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lukataylor.bookapp.widget
        INFOPLIST_FILE: BookAppWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: BookAppWidget/BookAppWidget.entitlements
        SKIP_INSTALL: YES
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"

  BookAppTests:
    type: bundle.unit-test
    supportedDestinations: [iOS, iPadOS]
    sources:
      - BookAppTests
    dependencies:
      - target: BookApp
    settings:
      base:
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/BookApp.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/BookApp

  BookAppUITests:
    type: bundle.ui-testing
    supportedDestinations: [iOS, iPadOS]
    sources:
      - BookAppUITests
    dependencies:
      - target: BookApp
    settings:
      base:
        TEST_TARGET_NAME: BookApp
