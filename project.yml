name: BookApp
options:
  bundleIdPrefix: com.bookapp
  deploymentTarget:
    iOS: "18.0"
    macOS: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false
  defaultConfig: Debug
  groupSortPosition: top
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    PRODUCT_BUNDLE_IDENTIFIER: com.bookapp.app
    INFOPLIST_FILE: BookApp/Supporting/Info.plist
    CODE_SIGN_ENTITLEMENTS: BookApp/Supporting/BookApp.entitlements
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"

packages:
  Readium:
    url: https://github.com/readium/swift-toolkit
    from: "3.0.0"
  # MLXSwift is opt-in. Add it after running:
  #   xcodebuild -downloadComponent MetalToolchain
  # then uncomment below + the dependency in the BookApp target.
  # MLXSwift:
  #   url: https://github.com/ml-explore/mlx-swift-examples
  #   from: "2.0.0"

targets:
  BookApp:
    type: application
    # macOS is reachable via Mac Catalyst (designedForIPad). Native macOS
    # currently fails to resolve Readium's SwiftSoup transitive dep — see
    # README → "macOS support".
    supportedDestinations: [iOS, iPadOS]
    sources:
      - path: BookApp
        excludes:
          - "Supporting/Info.plist"
          - "Supporting/BookApp.entitlements"
    resources:
      - path: BookApp/Resources
        optional: true
    dependencies:
      - package: Readium
        product: ReadiumShared
      - package: Readium
        product: ReadiumStreamer
      - package: Readium
        product: ReadiumNavigator
      # - package: MLXSwift
      #   product: MLXLLM
    settings:
      base:
        SWIFT_OBJC_BRIDGING_HEADER: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  BookAppTests:
    type: bundle.unit-test
    supportedDestinations: [iOS, iPadOS]
    sources:
      - BookAppTests
    dependencies:
      - target: BookApp
    settings:
      base:
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/BookApp.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/BookApp
